[pytest]
testpaths = .
norecursedirs = .git .tox dist build node_modules apps packages
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov=config_sidebar
    --cov-report=term-missing
    --cov-report=xml