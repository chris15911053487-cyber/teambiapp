name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run tests
      run: |
        python -m pytest --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

    - name: Run linting
      run: |
        pip install flake8
        flake8 app.py config_sidebar.py tests.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app.py config_sidebar.py tests.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/teambition-app
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # 停止并删除旧容器
          docker stop teambition-api-tool || true
          docker rm teambition-api-tool || true

          # 拉取最新镜像
          docker pull ${{ secrets.DOCKER_USERNAME }}/teambition-app:latest

          # 启动新容器
          docker run -d \
            --name teambition-api-tool \
            -p 8501:8501 \
            -v /opt/teambition-app/data:/app/data \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/teambition-app:latest

          # 等待应用启动
          sleep 10

          # 检查应用健康状态
          if curl -f http://localhost:8501/_stcore/health; then
            echo "✅ 应用部署成功"
          else
            echo "❌ 应用部署失败"
            exit 1
          fi