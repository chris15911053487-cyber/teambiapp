version: "3.8"

services:
  # Legacy Streamlit (default)
  teambition-app:
    build: .
    container_name: teambition-api-tool
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: teambition-redis
    ports:
      - "6379:6379"
    profiles: ["modern"]

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: teambition-backend
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      TB_COMPANY_PROFILES_JSON: ${TB_COMPANY_PROFILES_JSON:-[]}
    depends_on:
      - redis
    profiles: ["modern"]

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: teambition-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    profiles: ["modern"]

  celery-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: teambition-celery
    command: celery -A app.celery_app:celery_app worker --loglevel=INFO
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    profiles: ["modern", "worker"]
